<div class="add-habit-container fade-in">
    <div class="d-flex align-items-center mb-4">
        <button class="btn btn-link text-secondary p-0 me-3" data-action="load-page" data-page="habit-list">
            <i class="fas fa-arrow-left fa-lg"></i>
        </button>
        <h2 class="h4 fw-bold mb-0">Create New Habit</h2>
    </div>

    <div class="card border-0 rounded-4 shadow-sm p-4 mb-4">
        <form id="add-habit-form">
            <div class="mb-4">
                <label for="habit-name" class="form-label fw-bold text-secondary small text-uppercase tracking-wider">Habit Name</label>
                <input type="text" class="form-control form-control-lg rounded-3 border-light bg-light" id="habit-name" placeholder="e.g., Morning Meditation" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold text-secondary small text-uppercase tracking-wider">Category</label>
                <div class="row g-2">
                    <div class="col-6">
                        <input type="radio" class="btn-check" name="habit-category" id="cat-mental" value="mental_health" checked autocomplete="off">
                        <label class="btn btn-outline-primary w-100 py-3 rounded-3 d-flex flex-column align-items-center" for="cat-mental">
                            <i class="fas fa-brain mb-2"></i>
                            <span class="small">Mental</span>
                        </label>
                    </div>
                    <div class="col-6">
                        <input type="radio" class="btn-check" name="habit-category" id="cat-physical" value="physical_health" autocomplete="off">
                        <label class="btn btn-outline-success w-100 py-3 rounded-3 d-flex flex-column align-items-center" for="cat-physical">
                            <i class="fas fa-dumbbell mb-2"></i>
                            <span class="small">Physical</span>
                        </label>
                    </div>
                    <div class="col-6">
                        <input type="radio" class="btn-check" name="habit-category" id="cat-productivity" value="productivity" autocomplete="off">
                        <label class="btn btn-outline-warning w-100 py-3 rounded-3 d-flex flex-column align-items-center" for="cat-productivity">
                            <i class="fas fa-briefcase mb-2"></i>
                            <span class="small">Work</span>
                        </label>
                    </div>
                    <div class="col-6">
                        <input type="radio" class="btn-check" name="habit-category" id="cat-care" value="self_care" autocomplete="off">
                        <label class="btn btn-outline-info w-100 py-3 rounded-3 d-flex flex-column align-items-center" for="cat-care">
                            <i class="fas fa-spa mb-2"></i>
                            <span class="small">Self-Care</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <label for="habit-frequency" class="form-label fw-bold text-secondary small text-uppercase tracking-wider">Frequency</label>
                <select class="form-select form-select-lg rounded-3 border-light bg-light" id="habit-frequency">
                    <option value="daily" selected>Daily</option>
                    <option value="weekly">Weekly</option>
                </select>
            </div>

            <div class="d-grid gap-2 pt-3">
                <button type="submit" class="btn btn-primary btn-lg rounded-pill py-3 fw-bold shadow-sm">
                    Create Habit
                </button>
            </div>
        </form>
    </div>

    <div class="alert alert-soft-primary rounded-4 border-0 p-3 small text-secondary">
        <i class="fas fa-info-circle text-primary me-2"></i>
        Habits help you build a better version of yourself. Start small and stay consistent!
    </div>
</div>

<style>
    .btn-check:checked + .btn-outline-primary {
        background-color: rgba(108, 155, 210, 0.1);
        border-color: var(--color-primary);
        color: var(--color-primary);
    }
    .btn-check:checked + .btn-outline-success {
        background-color: rgba(165, 214, 167, 0.1);
        border-color: var(--color-secondary);
        color: var(--color-secondary);
    }
    .btn-check:checked + .btn-outline-warning {
        background-color: rgba(255, 213, 79, 0.1);
        border-color: var(--color-accent);
        color: #d4a500;
    }
    .btn-check:checked + .btn-outline-info {
        background-color: rgba(0, 188, 212, 0.1);
        border-color: #00bcd4;
        color: #00838f;
    }
</style>
