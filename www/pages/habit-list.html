<div class="habit-page fade-in">
    <!-- Page Header & Toolbar -->
    <section class="habit-header mb-4 mt-2 px-1">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h2 class="h3 fw-bold text-dark mb-1">My Habits</h2>
                <p class="text-secondary small">Small steps, every day.</p>
            </div>
            <button class="btn btn-primary rounded-circle shadow-sm d-flex align-items-center justify-content-center" 
                    style="width: 40px; height: 40px;"
                    data-action="load-page" data-page="add-habit">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <!-- Filters Toolbar -->
        <div class="habit-toolbar d-flex align-items-center overflow-auto pb-2 mb-2 no-scrollbar" style="gap: 0.75rem;">
            <button class="btn btn-light rounded-pill px-3 py-1 small fw-bold active-filter" data-filter="all">All</button>
            <button class="btn btn-light rounded-pill px-3 py-1 small fw-bold" data-filter="mental">Mental</button>
            <button class="btn btn-light rounded-pill px-3 py-1 small fw-bold" data-filter="physical">Physical</button>
            <button class="btn btn-light rounded-pill px-3 py-1 small fw-bold" data-filter="self-care">Self-Care</button>
        </div>
    </section>

    <!-- Habit List Container -->
    <section id="habit-container" class="habit-list mb-5">
        <!-- Rendered by HabitManager.renderHabitList -->
        <div class="empty-habit-state opacity-50">
            <i class="fas fa-clipboard-list empty-icon text-light-primary"></i>
            <p class="empty-text">Loading your habits...</p>
        </div>
    </section>

</div>
