<div class="dashboard-container fade-in">
    <!-- Header Section -->
    <section class="dashboard-header mb-4 mt-2">
        <h2 class="h3 fw-bold text-dark mb-1">Analytics Dashboard</h2>
        <p class="text-secondary small">Your wellness journey, visualized.</p>
    </section>

    <!-- Stats Grid -->
    <section id="dashboard-summary" class="mb-4">
        <!-- Rendered by DashboardManager.loadDashboardSummary -->
        <div class="d-flex justify-content-center py-5">
            <div class="spinner-border text-primary opacity-25" role="status">
                <span class="visually-hidden">Loading Stats...</span>
            </div>
        </div>
    </section>

    <!-- Charts Section -->
    <section class="charts-section">
        <!-- Habit Completion Chart -->
        <div class="chart-card-wrapper mb-4">
            <div id="habit-completion-chart-container">
                <!-- Reusable component injected here or manual structure -->
                <div class="card border-0 rounded-4 shadow-sm overflow-hidden">
                    <div class="card-header bg-white border-0 py-3 d-flex align-items-center">
                        <div class="chart-icon me-2 p-2 rounded-circle bg-light-primary d-flex align-items-center justify-content-center" style="width: 32px; height: 32px;">
                            <i class="fas fa-tasks text-primary" style="font-size: 0.8rem;"></i>
                        </div>
                        <h4 class="h6 fw-bold mb-0 text-dark">Habit Performance</h4>
                    </div>
                    <div class="card-body p-3">
                        <div style="height: 250px;">
                            <canvas id="habitCompletionChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mood Trend Chart -->
        <div class="chart-card-wrapper mb-4">
            <div id="mood-trend-chart-container">
                <div class="card border-0 rounded-4 shadow-sm overflow-hidden">
                    <div class="card-header bg-white border-0 py-3 d-flex align-items-center">
                        <div class="chart-icon me-2 p-2 rounded-circle bg-light-info d-flex align-items-center justify-content-center" style="width: 32px; height: 32px; background-color: rgba(0, 188, 212, 0.1);">
                            <i class="fas fa-chart-line text-info" style="font-size: 0.8rem;"></i>
                        </div>
                        <h4 class="h6 fw-bold mb-0 text-dark">Mood Trends (7 Days)</h4>
                    </div>
                    <div class="card-body p-3">
                        <div style="height: 250px;">
                            <canvas id="moodTrendChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mood Distribution -->
        <div class="chart-card-wrapper mb-4">
            <div id="mood-dist-chart-container">
                <div class="card border-0 rounded-4 shadow-sm overflow-hidden">
                    <div class="card-header bg-white border-0 py-3 d-flex align-items-center">
                        <div class="chart-icon me-2 p-2 rounded-circle bg-light-warning d-flex align-items-center justify-content-center" style="width: 32px; height: 32px; background-color: rgba(255, 193, 7, 0.1);">
                            <i class="fas fa-pie-chart text-warning" style="font-size: 0.8rem;"></i>
                        </div>
                        <h4 class="h6 fw-bold mb-0 text-dark">Emotion Balance</h4>
                    </div>
                    <div class="card-body p-3">
                        <div style="height: 250px;">
                            <canvas id="moodDistChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Wellness Insights -->
    <section class="insights-section mb-4">
        <h3 class="h6 fw-bold text-uppercase text-muted mb-3 px-1 tracking-wider">Deep Insights</h3>
        <div id="wellness-insights-container">
            <!-- Rendered by DashboardManager.generateWellnessInsights -->
        </div>
    </section>
</div>

<style>
    .tracking-wider { letter-spacing: 0.05em; }
    #dashboard-summary .dashboard-summary-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
    }
    @media (min-width: 768px) {
        #dashboard-summary .dashboard-summary-grid {
            grid-template-columns: repeat(4, 1fr);
        }
    }
</style>
