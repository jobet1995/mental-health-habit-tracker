<div class="chart-component card shadow-sm mb-4 border-0 rounded-4 overflow-hidden scale-in">
    <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <div class="chart-icon me-2 p-2 rounded-circle bg-light-primary d-flex align-items-center justify-content-center" style="width: 32px; height: 32px;">
                <i class="fas {{titleIcon}} text-primary" style="font-size: 0.8rem;"></i>
            </div>
            <h4 class="h6 fw-bold mb-0 text-dark">{{title}}</h4>
        </div>
        <div class="chart-controls">
            <span class="badge bg-light text-primary rounded-pill px-3 fw-semibold" style="font-size: 0.75rem;">{{timeframe}}</span>
        </div>
    </div>
    <div class="card-body p-3">
        <div class="chart-wrapper position-relative" style="height: 250px;">
            <canvas id="{{chartId}}"></canvas>
        </div>
    </div>
    <div class="card-footer bg-light border-0 py-2">
        <div class="d-flex align-items-center justify-content-center text-muted" style="font-size: 0.75rem;">
            <i class="fas fa-info-circle me-1"></i>
            <span>{{insightPreview}}</span>
        </div>
    </div>
</div>
