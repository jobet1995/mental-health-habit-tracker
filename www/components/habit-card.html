<div class="habit-card card shadow-sm mb-3 border-0 rounded-4 overflow-hidden fade-in" data-id="{{id}}">
    <div class="card-body p-3">
        <div class="d-flex align-items-center justify-content-between">
            <div class="habit-details d-flex align-items-center">
                <div class="category-icon me-3 p-2 rounded-circle bg-light">
                    <i class="fas {{categoryIcon}} text-primary"></i>
                </div>
                <div>
                    <h3 class="h6 fw-bold mb-1 text-dark">{{name}}</h3>
                    <div class="d-flex align-items-center">
                        <span class="badge border text-muted fw-normal rounded-pill px-2 py-1 small me-2">{{category}}</span>
                        <small class="text-secondary fw-medium small">{{frequency}}</small>
                    </div>
                </div>
            </div>
            
            <div class="habit-stats text-center px-2 border-start">
                <div class="d-flex align-items-center justify-content-center mb-1">
                    <i class="fas fa-fire text-warning me-1"></i>
                    <span class="fw-bold h6 mb-0">{{streak}}</span>
                </div>
                <small class="text-uppercase text-muted fw-bold" style="font-size: 0.5rem; letter-spacing: 0.05em;">Days</small>
            </div>

            <div class="habit-edit px-2 border-start">
                <button class="btn btn-link text-muted p-0" data-action="edit-habit" data-id="{{id}}">
                    <i class="fas fa-pencil-alt small"></i>
                </button>
            </div>

            <div class="habit-action ps-2">
                <button class="btn btn-action habit-toggle-btn rounded-circle d-flex align-items-center justify-content-center {{completedClass}}" 
                        style="width: 48px; height: 48px;"
                        data-id="{{id}}">
                    <i class="fas fa-check h5 mb-0"></i>
                </button>
            </div>
        </div>
        
        <!-- Progress Indicator -->
        <div class="progress mt-3" style="height: 4px;">
            <div class="progress-bar bg-primary" role="progressbar" style="width: {{completionPercent}}%;" aria-valuenow="{{completionPercent}}" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
    </div>
</div>
