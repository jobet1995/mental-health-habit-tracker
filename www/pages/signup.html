<div class="signup-container vh-100 d-flex flex-column align-items-center justify-content-center p-4 fade-in">
    <div class="auth-card card border-0 rounded-4 shadow-lg p-4 w-100" style="max-width: 400px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);">
        <div class="text-center mb-4">
            <div class="auth-logo bg-success text-white p-3 rounded-circle d-inline-flex mb-3">
                <i class="fas fa-user-plus fa-2x"></i>
            </div>
            <h2 class="h3 fw-bold text-success" style="background: linear-gradient(45deg, #A5D6A7, #66BB6A); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Start Journey</h2>
            <p class="text-secondary small">Create your account to begin tracking</p>
        </div>

        <form id="signup-form">
            <div class="form-group mb-3">
                <label for="signup-name" class="small fw-bold text-uppercase text-muted">Full Name</label>
                <input type="text" class="form-control rounded-3 border-light bg-light p-3" id="signup-name" placeholder="John Doe" required>
            </div>
            <div class="form-group mb-3">
                <label for="signup-email" class="small fw-bold text-uppercase text-muted">Email Address</label>
                <input type="email" class="form-control rounded-3 border-light bg-light p-3" id="signup-email" placeholder="name@example.com" required>
            </div>
            <div class="form-group mb-4">
                <label for="signup-password" class="small fw-bold text-uppercase text-muted">Password</label>
                <input type="password" class="form-control rounded-3 border-light bg-light p-3" id="signup-password" placeholder="••••••••" required>
            </div>

            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-success btn-lg rounded-pill py-3 fw-bold shadow-sm border-0" style="background: linear-gradient(45deg, #A5D6A7, #66BB6A);">
                    Create Account
                </button>
            </div>

            <div class="text-center">
                <p class="small text-secondary mb-0">Already have an account? 
                    <a href="#" class="fw-bold text-primary text-decoration-none" data-action="load-page" data-page="login">Sign In</a>
                </p>
            </div>
        </form>
    </div>

    <!-- Decorative background blobs -->
    <div class="position-fixed top-0 start-0 w-100 h-100 z-n1 overflow-hidden opacity-25">
        <div class="blob bg-success position-absolute rounded-circle" style="width: 300px; height: 300px; top: -150px; right: -150px; filter: blur(80px);"></div>
        <div class="blob bg-primary position-absolute rounded-circle" style="width: 250px; height: 250px; bottom: -100px; left: -100px; filter: blur(80px);"></div>
    </div>
</div>
