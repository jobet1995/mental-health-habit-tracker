<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <!-- 
            SECURE CSP: 
            Removed 'unsafe-eval' to fix Electron security warnings.
            Allowed cdnjs for Chart.js (or you can bundle it locally).
        -->
        <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://ssl.gstatic.com; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content: blob:;">
        
        <meta name="format-detection" content="telephone=no">
        <meta name="msapplication-tap-highlight" content="no">
        <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
        <meta name="color-scheme" content="light dark">
        
        <link rel="stylesheet" href="css/bootstrap.min.css">
        <link rel="stylesheet" href="css/all.min.css">
        <link rel="stylesheet" href="css/index.css">
        <link rel="stylesheet" href="css/dashboard.css">
        <link rel="stylesheet" href="css/habit.css">
        <link rel="stylesheet" href="css/mood.css">
        <title>MindHabit</title>
    </head>
    <body class="bg-background">
        <!-- Header Component Container -->
        <div id="header-container"></div>

        <!-- Main App Container (SPA Content) -->
        <main id="app" class="app-content container">
            <div id="app-loader" class="d-flex flex-column align-items-center justify-content-center vh-100 fade-in">
                <div class="spinner-grow text-primary" role="status" style="width: 3rem; height: 3rem;">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3 fw-bold text-secondary animate-pulse">MindHabit is preparing...</p>
            </div>
        </main>

        <!-- Footer Component Container -->
        <div id="footer-container"></div>

        <!-- Global Modals Container -->
        <div id="modal-container"></div>

        <!-- External Libraries -->
        <script src="js/jquery.min.js"></script>
        <script src="js/bootstrap.bundle.min.js"></script>
        <script src="js/chart.js"></script> <!-- Still need to download this one locally too -->

        <!-- Cordova Library -->
        <script src="cordova.js"></script>

        <!-- App Modules -->
        <script src="js/utils.js"></script>
        <script src="js/auth.js"></script>
        <script src="js/db.js"></script>
        <script src="js/habit.js"></script>
        <script src="js/mood.js"></script>
        <script src="js/notifications.js"></script>
        <script src="js/dashboard.js"></script>
        
        <!-- Main Entry Point -->
        <script src="js/index.js"></script>
    </body>
</html>
